; TTC Transit Screen — PlatformIO build configuration.

[platformio]
default_envs = esp32-s3-n16r8

[env]
platform = platformio/espressif32@7.0.1
framework = arduino
monitor_speed = 115200
; Embed the web config UI (web/ -> include/web_page.h) before compiling.
extra_scripts = pre:tools/build_web.py
build_flags =
	-DBOARD_HAS_PSRAM
	-DENABLE_DISPLAY
	; Route Serial to the native USB port labeled "USB".
	-DARDUINO_USB_CDC_ON_BOOT=1
	; Keep contributor home-directory paths out of release binaries.
	-ffile-prefix-map=${sysenv.HOME}=.
	-fmacro-prefix-map=${sysenv.HOME}=.
	-fdebug-prefix-map=${sysenv.HOME}=.
lib_deps =
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display @ 3.0.15
	adafruit/Adafruit GFX Library @ 1.12.6
	bblanchon/ArduinoJson @ 7.4.3

; Tested hardware: 16 MB quad flash + 8 MB octal PSRAM.
[env:esp32-s3-n16r8]
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

; Compile-supported alternative: 8 MB quad flash + 2 MB quad PSRAM.
[env:esp32-s3-n8r2]
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
